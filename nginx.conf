events {
    worker_connections 4096;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
    gzip_min_length 1024;

    # Timeouts
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 65s;
    send_timeout 15s;

    # Upstream backend pool with health checks
    upstream kinnect_backend {
        least_conn;  # Use least connections load balancing

        server backend-1:3001 weight=1 max_fails=3 fail_timeout=30s;
        server backend-2:3002 weight=1 max_fails=3 fail_timeout=30s;
        server backend-3:3003 weight=1 max_fails=3 fail_timeout=30s;

        # Keep connections alive for better performance
        keepalive 32;
    }

    # Upstream monitoring servers
    upstream kinnect_monitoring {
        server backend-1:9091;
        server backend-2:9092;
        server backend-3:9093;
    }

    server {
        listen 80;
        server_name _;

        # Health check endpoint (always available)
        location /health {
            access_log off;
            proxy_pass http://kinnect_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Monitoring endpoints (port 9090 on first backend)
        location /metrics {
            access_log off;
            proxy_pass http://backend-1:9091;
        }

        location /diagnostics {
            access_log off;
            proxy_pass http://backend-1:9091;
        }

        location /debug {
            access_log off;
            proxy_pass http://backend-1:9091;
        }

        # Main application - WebSocket and HTTP
        location / {
            proxy_pass http://kinnect_backend;
            proxy_http_version 1.1;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for WebSocket (long-lived connections)
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;

            # Buffering disabled for real-time
            proxy_buffering off;

            # Keep connections alive
            proxy_set_header Connection "";
        }
    }
}
