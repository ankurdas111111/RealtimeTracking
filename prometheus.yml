global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'kinnect'
    environment: 'development'

scrape_configs:
  # Kinnect Backend (single pod)
  - job_name: 'kinnect-backend'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'kinnect-backend'
          pod: 'kinnect'

  # Health checks
  - job_name: 'kinnect-health'
    metrics_path: '/health'
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'kinnect-health'
          pod: 'kinnect'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
